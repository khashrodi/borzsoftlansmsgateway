name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK (Installable)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Accept Android Licenses
        run: yes | gradle --quiet dependencies --configuration debugRuntimeClasspath || true
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx3g"

      - name: List output files
        run: find app/build/outputs -name "*.apk" -exec ls -lh {} \;

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BorzSoft-LAN-SMS-Gateway-DEBUG-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          name: BorzSoft SMS Gateway ${{ github.ref_name }}
